name: Feature Request
description: Suggest a new feature for YouJust
title: "[Feature]: "
labels: ["feature request"]

body:
  - type: textarea
    id: feature
    attributes:
      label: Feature Description
      description: Describe the feature you would like to see.
      placeholder: Explain your idea here...
    validations:
      required: true

  - type: textarea
    id: reason
    attributes:
      label: Why should this feature be added?
      description: Explain how this would improve YouJust.
      placeholder: This feature would help because...

  - type: textarea
    id: implementation
    attributes:
      label: Possible Implementation (Optional)
      description: If you have ideas for how this could work, describe them here.
      placeholder: The feature could work like this...

  - type: checkboxes
    id: checks
    attributes:
      label: Before submitting
      options:
        - label: I confirmed this feature has not already been requested.
          required: true
        - label: I confirmed this feature fits YouJust.
          required: true
